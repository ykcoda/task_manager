services:
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    ports:
      - "8001:8001"
    environment:
      HOST: "0.0.0.0"
      PORT: "8001"
    volumes:
      - ./mcp_server.py:/app/mcp_server.py
    command: ["uv", "run", "watchfiles", "python mcp_server.py", "."]
    restart: unless-stopped

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      MCP_SERVER_URL: "http://mcp-server:8001/sse"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
    volumes:
      - ./main.py:/app/main.py
      - ./agent.py:/app/agent.py
    command: ["uv", "run", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      - mcp-server
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "8501:8501"
    environment:
      API_URL: "http://fastapi:8000"
    volumes:
      - ./streamlit_app.py:/app/streamlit_app.py
    depends_on:
      - fastapi
    restart: unless-stopped
